version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: beauty-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: beauty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d beauty_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beauty-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-worker:
    build:
      context: ../ai-worker
      dockerfile: Dockerfile
    container_name: beauty-ai-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MOCK_MODE=true
      - FAL_KEY=${FAL_KEY:-}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
