name: Beauty App CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
        
      # Instala las dependencias y corre tests
    - name: Install dependencies & run tests
      run: |
        cd backend
        npm ci
        npm test

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Install dependencies
      run: |
        cd frontend
        flutter pub get
        
    - name: Run Flutter analyzer & tests
      run: |
        cd frontend
        flutter analyze
        flutter test
